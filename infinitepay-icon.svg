<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- InfinitePay logo - overlapping diamond/square shapes -->
  <g transform="translate(24, 24)">
    <!-- Back diamond (darker green) -->
    <rect x="-9" y="-9" width="18" height="18" rx="3" ry="3" transform="rotate(45) translate(-4, -4)" fill="#006B3F"/>
    <!-- Front diamond (lighter green) -->
    <rect x="-9" y="-9" width="18" height="18" rx="3" ry="3" transform="rotate(45) translate(4, 4)" fill="#00A868"/>
  </g>
</svg>
